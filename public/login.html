<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f1f5f9;
            font-family: sans-serif;
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px; 
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            color: #0f172a;
        }

        .login-card {
            background-color: #3b82f6;
            width: 350px;
            padding: 30px;
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .form-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        button {
            padding: 8px 16px;
            border: none;
            background-color: white;
            color: black;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        
        <h1>Login to Access Admin Page</h1>

        <div class="login-card">
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="username1234" value="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="password1234" value="password">
                </div>

                <div class="form-footer">
                    <button type="submit">Login</button>
                </div>
            </form>
        </div>

        <p id="message" style="color: red;"></p>
    </div>

    <script src="login.js"></script>
</body>
</html>
