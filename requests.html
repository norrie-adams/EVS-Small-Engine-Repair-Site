<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request a Repair - EVS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <nav class="nav-bar">
        <a href="index.html" class="navbutton">Home</a>
        <a href="requests.html" class="navbutton">Request a Repair</a>
        <a href="reviews.html" class="navbutton">Reviews</a>
        <a href="about.html" class="navbutton">About</a>
        <a href="contact.html" class="navbutton">Contact</a>
    </nav>
</header>

<main class="container" style="max-width: 700px;">
    <h1 style="text-align: center;">Repair Request Form</h1>
    <p style="text-align: center; margin-bottom: 20px;">Please fill out the fields below and we will get back to you.</p>

    <form action="#" method="GET"> <label>Full Name</label>
        <input type="text" placeholder="Your Name" required>

        <label>Email</label>
        <input type="email" placeholder="email@example.com" required>

        <label>Phone Number</label>
        <input type="tel" placeholder="(555) 555-5555" required>

        <label>Machine Type</label>
        <input type="text" placeholder="Ex: Honda Lawn Mower" required>

        <label>Service Type</label>
        <select>
            <option value="tuneup">Full Tune-Up</option>
            <option value="repair">Specific Repair</option>
        </select>

        <label>Problem Description</label>
        <textarea rows="4" placeholder="Tell us what is wrong..."></textarea>

        <label>Upload Photo(s) - Add up to 5</label>
        <input type="file" multiple>

        <button type="submit" class="button" style="width: 100%; border: none; cursor: pointer;">Submit Request</button>
    </form>
</main>
</body>
</html>
